<!doctype html>

<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>"im dum as you!"</title>
        <link rel="stylesheet" href="css/style.css" />
    </head>
    <body>
        <!--navigation bar-->
        <nav class="navbar">
            <div class="logo"><img src="assets/logo.svg" alt="Logo" /></div>
            <ul class="nav-links">
                <li><a href="#">About</a></li>
                <li><a href="#">Features</a></li>
                <li><a href="#">Pricing</a></li>
                <li><a href="#">Testimonials</a></li>
                <li><a href="#">Help</a></li>
            </ul>
            <div class="nav-actions">
                <a href="#">Sign In</a>
                <a href="#" class="btn-signup">Sign Up</a>
            </div>
        </nav>
        <br />
        <!--hero section-->
        <section class="hero">
            <div class="hero-text">
                <img src="assets/want-everything.svg" alt="Logo" />

                <p>
                    Provide a network for all your needs with ease and fun using
                    LaslesVPN, discover interesting features from us.
                </p>

                <button class="btn-primary">Get Started</button>
            </div>
            <div class="hero-image">
                <img
                    class="main-illustration"
                    src="assets/illustration1.svg"
                    alt="illustration"
                />
            </div>
        </section>
        <!--stats-->
        <section class="stats">
            <div class="stat">
                <div class="stat-icon">
                    <img src="assets/stats/usericon.svg" alt="Logo" />
                </div>
                <div class="user"></div>
                <div>
                    <div class="stat-number">90+</div>
                    <div class="stat-label">Users</div>
                </div>
            </div>
            <div class="stat">
                <div class="stat-icon">
                    <img src="assets/stats/location.svg" alt="Logo" />
                </div>
                <div>
                    <div class="stat-number">30+</div>
                    <div class="stat-label">Locations</div>
                </div>
            </div>
            <div class="stat">
                <div class="stat-icon">
                    <img src="assets/stats/server.svg" alt="Logo" />
                </div>
                <div>
                    <div class="stat-number">50+</div>
                    <div class="stat-label">Servers</div>
                </div>
            </div>
        </section>
        <hr />

        <div>page2 loading</div>
    </body>
</html>
